<div class="container">

<div id="telaForm">
<h1 class="titulo">Sua carteirinha do clube</h1>
<p class="sub">Participe, conecte-se e faça parte dessa história.</p>
<p class="cta">Responda rapidinho e garanta a sua!</p>

<div class="card">
<label>1. Qual seu nome?</label>
<input type="text" id="nome" placeholder="Digite seu nome">
</div>

<div class="card">
<label>2. O que mais te motiva a participar do clube?</label>
<div class="opcoes">
<button onclick="responder('Trocar ideias')">💬 Trocar ideias</button>
<button onclick="responder('Aprender na prática')">🚀 Aprender na prática</button>
<button onclick="responder('Conhecer pessoas')">👥 Conhecer pessoas</button>
</div>
</div>

<div class="card">
<label>3. O conceito de protagonismo estudantil no Clube universitário significa que você:</label>
<div class="opcoes" id="q3">
<button onclick="verificar(this,3,'A')">Participa apenas como ouvinte.</button>
<button onclick="verificar(this,3,'B')">É responsável apenas por cumprir tarefas obrigatórias.</button>
<button onclick="verificar(this,3,'C')">Atua de forma ativa.</button>
</div>
</div>

<div class="card">
<label>4. Como você vivencia as atividades do clube?</label>
<div class="opcoes" id="q4">
<button onclick="verificar(this,4,'A')">Leituras obrigatórias.</button>
<button onclick="verificar(this,4,'B')">Encontros síncronos e interações no AVA, como fóruns.</button>
<button onclick="verificar(this,4,'C')">Provas e avaliações.</button>
</div>
</div>

<div class="card">
<label>5. A Declaração de Horas Complementares será emitida para estudantes que:</label>
<div class="opcoes" id="q5">
<button onclick="verificar(this,5,'A')">participarem de todas as atividades obrigatórias.</button>
<button onclick="verificar(this,5,'B')">obtiverem nota mínima nas avaliações</button>
<button onclick="verificar(this,5,'C')">Participarem de, no mínimo, 75% das atividades.</button>
</div>
</div>

<div class="card">
<label>6. As atividades do Clube universitário são organizadas fora do horário das aulas regulares com o objetivo de:</label>
<div class="opcoes" id="q6">
<button onclick="verificar(this,6,'A')">Aumentar a carga horária obrigatória.</button>
<button onclick="verificar(this,6,'B')">ubstituir disciplinas da grade curricular.</button>
<button onclick="verificar(this,6,'C')">Evitar conflitos com a rotina acadêmica.</button>
</div>
</div>

<button class="gerar" onclick="validar()">Gerar minha carteirinha →</button>
</div>

<div id="telaCarteirinha" style="display:none;">
<h2>Sua carteirinha está pronta!</h2>

<div class="carteirinha">
<div class="lado-esquerdo">
<img src="https://raw.githubusercontent.com/PUCPR4D/SistemasWebSeguros/main/logo_pucpr_rgb.png" class="logo">
</div>

<div class="lado-direito">
<p class="membro">Membro do Clube</p>
<p><strong>Nome:</strong> <span id="nomeCarteira"></span></p>
<p><strong>Motivação:</strong> <span id="motivacao"></span></p>
</div>
</div>

<button class="voltar" onclick="voltar()">← Voltar</button>
</div>

</div>

<style>
body { font-family: Arial; background:#f5f5f5; }
.container { max-width:500px; margin:auto; text-align:center; }

.titulo { color:#6D64AE; }
.cta { color:#6D64AE; font-weight:bold; }
.sub { color:#555; }

.card { background:white; padding:15px; margin:15px 0; border-radius:10px; text-align:left; }

.opcoes { display:flex; flex-direction:column; gap:8px; margin-top:10px; }

.opcoes button {
padding:10px;
border-radius:10px;
border:1px solid #ccc;
background:#fafafa;
cursor:pointer;
transition:0.2s;
}

/* ✅ NOVO DESTAQUE TOTAL */
.correta {
background:#28a745 !important;
color:white !important;
border:none !important;
transform: scale(1.02);
}

.incorreta {
background:#dc3545 !important;
color:white !important;
border:none !important;
transform: scale(1.02);
}

.gerar {
background:#e54878;
color:white;
padding:12px;
border:none;
width:100%;
border-radius:10px;
}

.carteirinha {
display:flex;
background:#6D64AE;
border-radius:15px;
margin-top:20px;
}

.lado-esquerdo { width:35%; display:flex; align-items:center; justify-content:center; }
.logo { width:100%; filter:brightness(0) invert(1); }

.lado-direito { color:white; padding:20px; width:65%; }
.membro { color:#DB5284; font-weight:bold; }

.voltar { margin-top:20px; padding:10px; background:#ccc; border:none; border-radius:8px; }
</style>

<script>
let motivacaoEscolhida = "";

const gabarito = {
3:'C',
4:'B',
5:'C',
6:'C'
};

function responder(opcao){
motivacaoEscolhida = opcao;
}

function verificar(botao, pergunta, resposta){

let container = document.getElementById("q"+pergunta);

if(container.classList.contains("respondido")) return;

container.classList.add("respondido");

let botoes = container.querySelectorAll("button");

botoes.forEach(btn=>{
let letra = btn.getAttribute("onclick").match(/'(.*?)'\)/)[1];

if(letra === gabarito[pergunta]){
btn.classList.add("correta");
}

if(btn === botao && letra !== gabarito[pergunta]){
btn.classList.add("incorreta");
}
});
}

function validar(){
let nome = document.getElementById("nome").value;

if(nome === "" || motivacaoEscolhida === ""){
alert("Preencha seu nome e a motivação 😉");
return;
}

document.getElementById("nomeCarteira").innerText = nome;
document.getElementById("motivacao").innerText = motivacaoEscolhida;

document.getElementById("telaForm").style.display = "none";
document.getElementById("telaCarteirinha").style.display = "block";
}

function voltar(){
document.getElementById("telaForm").style.display = "block";
document.getElementById("telaCarteirinha").style.display = "none";
}
</script>
